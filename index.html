<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product preview card component </title>
    <link rel="shortcut icon" href="./img/favicon-32x32.png" type="image/png">
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

<body>
    <div class="card wrapper">
        <div class="wrapper-img item">
            <img class="card_img" src="./img/image-product-desktop.jpg" alt="image product">
        </div>
        <div class="card_context">
            <h1 class="card_category">perfume</h1>
            <h2 class="card_title">gabrielle essence eau de parfum</h2>
            <p class="card_text">A floral, solar and voluptuous interpretation composed by Olivier Polge,
                Perfumer-Creator for the House of CHANEL.</p>
            <p class="price">$149.99 <span class="price-old">$169.99</span></p>
            <button class="button"><object data="./img/icon-cart.svg" type="image/svg+xml"></object> Add to
                Cart</button>
        </div>
    </div>

</body>

</html>
